{% extends 'events/base.html' %}

{% block content %}
<h1>Organizer Dashboard</h1>

<div class="d-flex justify-content-between mb-4">
    <a href="{% url 'events:create_event' %}" class="btn btn-primary">Create Event</a>
    <a href="{% url 'events:remove_event' %}" class="btn btn-danger">Remove Event</a>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Date</th>
            <th>Time</th>
            <th>Location</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for event in events %}
        <tr>
            <td>{{ event.name }}</td>
            <td>{{ event.date }}</td>
            <td>{{ event.time }}</td>
            <td>{{ event.location }}</td>
            <td>
                <a href="{% url 'events:edit_event' event.id %}" class="btn btn-warning btn-sm">Edit</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
