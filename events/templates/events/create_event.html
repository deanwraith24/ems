{% extends 'events/base.html' %}

{% block title %}Create Event{% endblock %}

{% block content %}
<h1>Create a New Event</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Create Event</button>
</form>

{% endblock %}
